services:
  php-fpm:
    image: php:8.2-fpm-alpine
    container_name: aplus-php-fpm
    working_dir: /var/www
    env_file:
      - .env
    volumes:
      - ./api:/var/www/api:ro
      - ./admin:/var/www/admin:ro
      - ./config:/var/www/config:ro
      - ./data:/var/www/data
      - ./send-mail.php:/var/www/send-mail.php:ro
      - ./csrf-token.php:/var/www/csrf-token.php:ro
    restart: unless-stopped

  nginx:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aplus-nginx
    ports:
      - "8080:80"
    depends_on:
      - php-fpm
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped
