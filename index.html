return `${basePath}${productSlug}/`;
};

  if (!pathname) return null;
  const trimmed = pathname.replace(/\/+$/, '');
  for (const base of CATEGORY_BASE_PATHS) {
    if (!trimmed.startsWith(base.replace(/\/+$/, ''))) continue;

const About = ({ content }) => {
const [activeSector, setActiveSector] = useState(0);
const [touchStart, setTouchStart] = useState(null);
const [touchEnd, setTouchEnd] = useState(null);
const minSwipeDistance = 50;
useEffect(() => {
const interval = setInterval(() => {
setActiveSector((prev) => (prev + 1) % content.about.trustedSectors.length);
}, 4000);
return () => clearInterval(interval);
}, [content.about.trustedSectors]);
const onTouchStart = (e) => { setTouchEnd(null); setTouchStart(e.targetTouches[0].clientX); };
const onTouchMove = (e) => { setTouchEnd(e.targetTouches[0].clientX); };
const onTouchEnd = () => {
if (!touchStart || !touchEnd) return;
const distance = touchStart - touchEnd;
const isLeftSwipe = distance > minSwipeDistance;
const isRightSwipe = distance < -minSwipeDistance;
if (isLeftSwipe) setActiveSector((prev) => (prev + 1) % content.about.trustedSectors.length);
else if (isRightSwipe) setActiveSector((prev) => (prev - 1 + content.about.trustedSectors.length) % content.about.trustedSectors.length);
};
return (

const CHEMISTRY_TYPES = [
  { value: 'Li-Ion', label: { ru: 'Li-Ion', en: 'Li-Ion' }, cellVoltage: 4.2 },
  { value: 'Li-Po', label: { ru: 'Li-Po', en: 'Li-Po' }, cellVoltage: 4.2 },
  { value: 'Li-Ion Semi-Solid', label: { ru: 'Li-Ion Semi-Solid', en: 'Li-Ion Semi-Solid' }, cellVoltage: 4.2 },
  { value: 'LiFePo4', label: { ru: 'LiFePo4', en: 'LiFePo4' }, cellVoltage: 3.6 }
];

const CELL_OPTIONS = {
  'Li-Ion': [
    { value: '18650', currentPerCell: 2.6, weight: 45, dims: { d: 18, h: 65 } },
    { value: '21700', currentPerCell: 5.0, weight: 68, dims: { d: 21, h: 70 } }
  ],
  'Li-Po': [
    { value: '4000мАч', currentPerCell: 4.0, weight: 90, dims: { d: 50, h: 70 } },
    { value: '5000мАч', currentPerCell: 5.0, weight: 100, dims: { d: 50, h: 80 } },
    { value: '7500мАч', currentPerCell: 7.5, weight: 140, dims: { d: 55, h: 90 } }
  ],
  'Li-Ion Semi-Solid': [
    { value: '16000мАч', currentPerCell: 16.0, weight: 350, dims: { d: 70, h: 100 } },
    { value: '20000мАч', currentPerCell: 20.0, weight: 420, dims: { d: 75, h: 105 } }
  ],
  'LiFePo4': [
    { value: '15000мАч', currentPerCell: 15.0, weight: 380, dims: { d: 70, h: 120 } }
  ]
};

const CONNECTOR_OPTIONS = ['XT30', 'XT60', 'XT90', 'Другой'];

const calculateSPConfig = (chemType, cellType, voltage, current) => {
  const chem = CHEMISTRY_TYPES.find(c => c.value === chemType);
  if (!chem || !voltage || !current) return { s: null, p: null };
  const s = Math.ceil(parseFloat(voltage) / chem.cellVoltage);
  let currentPerCell = 5;
  if (cellType && CELL_OPTIONS[chemType]) {
    const cell = CELL_OPTIONS[chemType].find(c => c.value === cellType);
    if (cell) currentPerCell = cell.currentPerCell;
  }
  const p = Math.ceil(parseFloat(current) / currentPerCell);
  return { s, p };
};

const calculateEstimates = (chemType, cellType, s, p) => {
  if (!s || !p || !cellType) return { dims: null, weight: null };
  const cells = CELL_OPTIONS[chemType]?.find(c => c.value === cellType);
  if (!cells) return { dims: null, weight: null };
  const totalWeight = (cells.weight * s * p) / 1000;
  const w = cells.dims.d * Math.ceil(Math.sqrt(p));
  const d = cells.dims.d * Math.ceil(p / Math.ceil(Math.sqrt(p)));
  const h = cells.dims.h * s;
  return {
    dims: `${Math.round(w * 1.2)} × ${Math.round(d * 1.2)} × ${Math.round(h * 1.2)} мм`,
    weight: `~${totalWeight.toFixed(2)} кг`
  };
};

const deepMergeContent = (base, override) => {
  if (Array.isArray(override)) {
    return override;
  }
  if (!override || typeof override !== 'object') {
    return override === undefined ? base : override;
  }
  const output = Array.isArray(base) ? [...base] : { ...(base || {}) };
  Object.keys(override).forEach((key) => {
    const sourceValue = base ? base[key] : undefined;
    output[key] = deepMergeContent(sourceValue, override[key]);
  });
  return output;
};

const applyHomeContentOverrides = (baseData, homeContent) => {
  if (!homeContent || typeof homeContent !== 'object') return baseData;
  return {
    ...baseData,
    ru: deepMergeContent(baseData.ru, homeContent.ru || {}),
    en: deepMergeContent(baseData.en, homeContent.en || {}),
  };
};

  };

    if (event.key !== 'aplus_site_settings' || !event.newValue) return;
    try { applyIncomingSettings(JSON.parse(event.newValue)); } catch (e) {}

    window.removeEventListener('aplus:settings-changed', handleSettingsChanged);
