worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  keepalive_requests 100;
  etag on;

  # --- Brotli compression (higher ratio than gzip) -------------------------
  brotli on;
  brotli_comp_level 6;
  brotli_min_length 256;
  brotli_types
    text/plain
    text/css
    text/javascript
    text/xml
    application/javascript
    application/json
    application/xml
    application/atom+xml
    application/rss+xml
    image/svg+xml
    font/woff2;

  # --- Compression -----------------------------------------------------------
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_min_length 256;
  gzip_types
    text/plain
    text/css
    text/javascript
    text/xml
    application/javascript
    application/json
    application/xml
    application/atom+xml
    application/rss+xml
    image/svg+xml
    font/woff2
    application/x-font-ttf
    application/font-woff;

  # --- Security: hide server version -----------------------------------------
  server_tokens off;

  # --- Rate limiting zone ----------------------------------------------------
  limit_req_zone $binary_remote_addr zone=form_limit:10m rate=2r/s;

  upstream php_fpm {
    server php-fpm:9000;
  }

  server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # === Security headers =====================================================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; frame-ancestors 'none'; frame-src 'self' https://sketchfab.com https://www.sketchfab.com; object-src 'none'; form-action 'self'; manifest-src 'self'; worker-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://unpkg.com https://cdn.tailwindcss.com https://ajax.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https://static.tildacdn.com https://images.unsplash.com https://optim.tildacdn.com https://radika1.link https://s1.radikal.cloud https://s2.radikal.cloud https://s3.radikal.cloud; font-src 'self' https://fonts.gstatic.com; connect-src 'self'; upgrade-insecure-requests" always;

    # === PHP endpoints ========================================================
    location /api/ {
      include fastcgi_params;
      fastcgi_pass php_fpm;
      fastcgi_index index.php;
      fastcgi_param SCRIPT_FILENAME /var/www$fastcgi_script_name;
      limit_req zone=form_limit burst=5 nodelay;
    }

    location = /admin/api.php {
      include fastcgi_params;
      fastcgi_pass php_fpm;
      fastcgi_param SCRIPT_FILENAME /var/www/admin/api.php;
      limit_req zone=form_limit burst=10 nodelay;
    }

    location = /send-mail.php {
      include fastcgi_params;
      fastcgi_pass php_fpm;
      fastcgi_param SCRIPT_FILENAME /var/www/send-mail.php;
      limit_req zone=form_limit burst=3 nodelay;
    }

    location = /csrf-token.php {
      include fastcgi_params;
      fastcgi_pass php_fpm;
      fastcgi_param SCRIPT_FILENAME /var/www/csrf-token.php;
    }

    # === Static asset caching =================================================
    location ~* \.(?:css|js|ico|svg|txt|xml|woff2|woff|ttf|eot)$ {
      expires 365d;
      add_header Cache-Control "public, max-age=31536000, immutable";
      add_header X-Content-Type-Options "nosniff" always;
      add_header Vary "Accept-Encoding" always;
      try_files $uri =404;
    }

    # Images get moderate cache with stale-while-revalidate
    location ~* \.(?:png|jpg|jpeg|gif|webp|avif)$ {
      expires 30d;
      add_header Cache-Control "public, max-age=2592000, stale-while-revalidate=86400";
      add_header Vary "Accept-Encoding" always;
      try_files $uri =404;
    }

    # Block access to sensitive files
    location ~ /\.(env|git|htaccess|svn) {
      deny all;
      return 404;
    }

    location ~ (?:composer\.(json|lock)|package(-lock)?\.json|tsconfig\.json|\.stylelintrc|Dockerfile|docker-compose\.yml|build\.sh)$ {
      deny all;
      return 404;
    }

    # Allow JSON data files (used as API fallback) but block SQLite/logs
    location ~* ^/data/.*\.json$ {
      try_files $uri =404;
    }

    # Block access to data (except JSON above), config, scripts, tools
    location ~ ^/(data|config|scripts|tools)/ {
      deny all;
      return 404;
    }

    # === Catalog SPA routing ==================================================
    location ~ ^/(batteries|copters|water)(/.*)?$ {
      add_header Vary "Accept-Encoding" always;
      try_files $uri $uri/ /index.html;
    }

    location / {
      add_header Vary "Accept-Encoding" always;
      add_header X-Content-Type-Options "nosniff" always;
      try_files $uri $uri/ /index.html;
    }

    # === Custom error pages ===================================================
    error_page 404 /404.html;
    location = /404.html {
      internal;
    }
  }
}
